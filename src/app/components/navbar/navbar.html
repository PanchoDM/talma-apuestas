<nav class="navbar">
  <div class="navbar__brand">
    <img src="assets/PollaMundial2026.webp" alt="PollaMundial2026" class="navbar__logo" />
    <span class="navbar__title">PollaMundial<span class="navbar__year">2026</span></span>
  </div>

  @if (user()) {
    <!-- Botón hamburguesa: solo visible en móvil via CSS -->
    <button class="navbar__hamburger" (click)="toggleMenu()" aria-label="Abrir menú">
      ☰
    </button>

    <!-- Contenedor de links y usuario -->
    <div class="navbar__menu" [class.active]="isMenuOpen">
      <div class="navbar__links">
        <a routerLink="/dashboard"   routerLinkActive="active" (click)="closeMenu()">Dashboard</a>
        <a routerLink="/leaderboard" routerLinkActive="active" (click)="closeMenu()">Posiciones</a>
        @if (isAdmin()) {
          <a routerLink="/admin" routerLinkActive="active" class="admin-link" (click)="closeMenu()">⚙ Admin</a>
        }
      </div>

      <div class="navbar__user">
        @if (!isAdmin()) {
          <span class="points-badge">⚽ {{ user()!.puntos_totales }} pts</span>
        }
        <span class="username">{{ user()!.nombre_usuario }}</span>
        <button class="btn-logout" (click)="auth.logout()">Salir</button>
      </div>
    </div>
  }
</nav>
