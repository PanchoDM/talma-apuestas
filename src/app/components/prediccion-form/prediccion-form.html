<div class="pf-overlay" (click)="cancel.emit()">
  <div class="pf-modal" (click)="$event.stopPropagation()">
    <h3 class="pf-title">Predice el Medio Tiempo</h3>
    <div class="pf-match">
      <span class="team">{{ partido.equipo_local }}</span>
      <span class="vs">VS</span>
      <span class="team">{{ partido.equipo_visitante }}</span>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="pf-scores">
        <div class="score-input">
          <label>{{ partido.equipo_local }}</label>
          <input formControlName="goles_local" type="number" min="0" max="20" />
        </div>
        <div class="score-separator">–</div>
        <div class="score-input">
          <label>{{ partido.equipo_visitante }}</label>
          <input formControlName="goles_visitante" type="number" min="0" max="20" />
        </div>
      </div>

      <div class="pf-tendency">
        Tendencia apostada: <strong>{{ tendenciaPreview }}</strong>
      </div>

      @if (error) { <div class="error-msg">{{ error }}</div> }

      <div class="pf-warning">
        ⚠ Las apuestas son definitivas y no se pueden cambiar
      </div>

      <div class="pf-actions">
        <button type="button" class="btn-cancel" (click)="cancel.emit()">Cancelar</button>
        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Guardando...' : 'Confirmar Apuesta' }}
        </button>
      </div>
    </form>
  </div>
</div>
